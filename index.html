  <style>

);padding:22px}.grid{display:grid;gap:18px}.grid3{grid-template-columns:repeat(3,minmax(0,1fr))}.grid2{grid-template-columns:repeat(2,minmax(0,1fr))}.stat{padding:20px;border-radius:20px;border:1px solid var(--border);background:linear-gradient(180deg,#fff,#f8fafc)}.stat b{display:block;font-size:28px;margin-top:8px}.stat span{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.08em;font-weight:800}.btn{border:0;border-radius:14px;padding:11px 15px;font-weight:850;cursor:pointer;background:var(--primary);color:#fff;box-shadow:0 12px 26px rgba(18,60,105,.22)}.btn:hover{filter:brightness(1.05)}.btn.secondary{background:#fff;color:var(--primary);border:1px solid var(--border);box-shadow:none}.btn.warn{background:var(--warn)}.btn.danger{background:var(--danger)}.btn.ok{background:var(--ok)}.btn.small{padding:7px 10px;border-radius:11px;font-size:12px}.actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.table{width:100%;border-collapse:collapse}.table th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:12px;border-bottom:1px solid var(--border)}.table td{padding:14px 12px;border-bottom:1px solid var(--border);vertical-align:top}.badge{display:inline-flex;align-items:center;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:850;border:1px solid var(--border);background:#f8fafc}.badge.ok{background:#ecfdf5;color:#047857;border-color:#a7f3d0}.badge.warn{background:#fffbeb;color:#b45309;border-color:#fde68a}.badge.danger{background:#fef2f2;color:#b91c1c;border-color:#fecaca}.badge.info{background:#eff6ff;color:#1d4ed8;border-color:#bfdbfe}label{display:block;font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:#475569;font-weight:900;margin-bottom:7px}input,textarea,select{width:100%;border:1px solid var(--border);border-radius:13px;padding:11px 12px;background:#fff;color:var(--text);font:inherit}textarea{min-height:88px;resize:vertical}.fieldGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.fieldGrid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}.checkGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px 14px}.checkItem{display:flex!important;align-items:flex-start;gap:8px;text-transform:none!important;letter-spacing:0!important;font-weight:650!important;color:#334155!important;margin:0!important}.checkItem input{width:auto;margin-top:2px}.formSection{border:1px solid var(--border);border-radius:20px;padding:18px;background:linear-gradient(180deg,#fff,#f8fafc)}.sectionHint{font-size:12px;color:var(--muted);line-height:1.55;margin:-6px 0 14px}.adminOnly{border:1px dashed #b8872f;background:#fffbeb}.sectionTitle{font-size:15px;font-weight:950;margin:22px 0 12px;color:#123c69}.hidden{display:none!important}.loginWrap{min-height:100vh;display:grid;place-items:center;padding:28px}.loginCard{width:min(980px,100%);display:grid;grid-template-columns:1.05fr .95fr;overflow:hidden;border-radius:28px;background:#fff;box-shadow:var(--shadow);border:1px solid var(--border)}.loginHero{padding:42px;background:linear-gradient(135deg,#0f2f55,#1e6091);color:#fff}.loginHero h1{font-size:36px;line-height:1.05;letter-spacing:-.05em}.loginHero p{line-height:1.7;opacity:.86}.loginForm{padding:38px}.notice{border:1px solid #bfdbfe;background:#eff6ff;color:#1e3a8a;border-radius:16px;padding:13px 15px;line-height:1.55;font-size:13px}.dangerNotice{border-color:#fecaca;background:#fef2f2;color:#991b1b}.okNotice{border-color:#a7f3d0;background:#ecfdf5;color:#065f46}.modal{position:fixed;inset:0;background:rgba(15,23,42,.54);display:none;place-items:center;padding:20px;z-index:30}.modal.show{display:grid}.modalBody{width:min(760px,100%);max-height:90vh;overflow:auto;background:#fff;border-radius:24px;padding:22px;box-shadow:var(--shadow)}.cert{width:210mm;min-height:297mm;background:white;color:#111;margin:0 auto;padding:20mm 18mm;border:10px double #123c69;font-family:Georgia,"Times New Roman",serif}.cert h1{text-align:center;font-size:18pt;margin:6px 0 2px;letter-spacing:.02em}.cert h2{text-align:center;font-size:13pt;margin:0 0 14px;text-decoration:underline}.cert .certTop{text-align:center;border-bottom:2px solid #123c69;padding-bottom:10px;margin-bottom:14px}.cert .certLogo{margin:auto;width:58px;height:58px;border-radius:50%;border:3px solid #123c69;display:grid;place-items:center;font-family:Arial;font-weight:900;color:#123c69}.certTable{width:100%;border-collapse:collapse;margin:12px 0;font-size:10.8pt}.certTable td{border:1px solid #aaa;padding:7px 8px;vertical-align:top}.certTable td:first-child{width:34%;font-weight:bold;background:#f3f6fb}.cert p{font-size:10.6pt;line-height:1.5;text-align:justify}.signature{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:26px}.verificationBox{display:flex;gap:12px;align-items:center;border:1px solid #94a3b8;padding:9px;min-height:118px}.qrImg{width:96px;height:96px;object-fit:contain}.verifyText{font-size:8pt;line-height:1.25}.signaturePanel{text-align:center;position:relative;min-height:190px}.sigImg{height:58px;max-width:210px;object-fit:contain;margin:8px auto -4px;display:block}.ethicsStamp{width:122px;height:122px;border:4px double rgba(184,39,39,.74);border-radius:50%;display:grid;place-items:center;margin:0 auto 4px;transform:rotate(-8deg);color:rgba(160,30,30,.82);font-family:Arial,sans-serif;font-weight:900;text-align:center;line-height:1.05;background:rgba(255,255,255,.45);box-shadow:0 0 0 2px rgba(184,39,39,.24) inset}.ethicsStamp .outer{font-size:8px;text-transform:uppercase;letter-spacing:.06em}.ethicsStamp .middle{font-size:15px;border-top:1px solid rgba(160,30,30,.58);border-bottom:1px solid rgba(160,30,30,.58);padding:3px 0;margin:4px 0}.ethicsStamp .inner{font-size:7px}.qr{width:110px;height:110px;border:1px dashed #555;display:grid;place-items:center;text-align:center;font-size:8pt;padding:8px}.printbar{position:sticky;top:0;background:#fff;padding:12px;border-bottom:1 function uid(){return crypto.randomUUID?crypto.randomUUID():'id-'+Math.random().toString(36).slice(2)+Date.now()}
function today(){return new Date().toISOString().slice(0,10)}
function dmy(t){const d=new Date(t||Date.now());return d.toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'})}
function esc(s){return String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
function blankDb(){return {users:[{id:uid(),email:DEFAULT_CHAIR_EMAIL,password:DEFAULT_CHAIR_PASSWORD,name:'Joko Slamet',title:'Dr.',affiliation:'Cipta Wacana University',role:'chair',createdAt:Date.now()}],applications:[],reviews:[],assignments:[],certificates:[],activities:[],session:null}}
function validDb(x){return x&&Array.isArray(x.users)&&Array.isArray(x.applications)&&Array.isArray(x.certificates)}
function load(){let raw=localStorage.getItem(STORE);let db=null;try{db=raw?JSON.parse(raw):null}catch(e){db=null}
 if(validDb(db))return db;
 const legacyKeys=['cwcu_ethics_static_v2','cwcu_ethics_static_v1','cwcu_ethics','ethics-cwcu','cwcu-ethics'];
 for(const k of legacyKeys){try{const old=JSON.parse(localStorage.getItem(k)||'null');if(validDb(old)){localStorage.setItem(STORE,JSON.stringify(old));return old}}catch(e){}}
 db=blankDb();save(db);return db} 
function save(db){localStorage.setItem(STORE,JSON.stringify(db))}
let db=load();

function appDuplicateKey(a){
  const title=String(a?.title||'').trim().toLowerCase().replace(/\s+/g,' ');
  if(!title)return '';
  return [a.researcherId||a.applicantName||'', certificateKind(a), title].join('|');
}
function appPriority(a){
  const order={approved:900,review_completed:700,under_review:600,submitted:500,revision_required:400,rejected:300,draft:100};
  return (order[a.status]||0)+(a.decidedAt||a.submittedAt||a.createdAt||0)/10000000000000;
}
function duplicateGroups(){
  const groups={};
  (db.applications||[]).forEach(a=>{const k=appDuplicateKey(a);if(k)(groups[k]||(groups[k]=[])).push(a)});
  return Object.values(groups).filter(g=>g.length>1);
}
function cleanupDuplicateApplications(showAlert=true){
  const groups=duplicateGroups();
  if(!groups.length){if(showAlert)alert('No duplicate applications found. / Tidak ada pengajuan ganda.');return 0}
  const removeIds=new Set();
  const remap={};
  groups.forEach(g=>{
    const keep=[...g].sort((a,b)=>appPriority(b)-appPriority(a))[0];
    g.forEach(a=>{if(a.id!==keep.id){removeIds.add(a.id);remap[a.id]=keep.id}});
  });
  db.applications=db.applications.filter(a=>!removeIds.has(a.id));
  db.assignments=(db.assignments||[]).filter(x=>!removeIds.has(x.applicationId));
  db.reviews=(db.reviews||[]).filter(x=>!removeIds.has(x.applicationId));
  (db.certificates||[]).forEach(c=>{if(remap[c.applicationId]&&!db.certificates.some(x=>x.applicationId===remap[c.applicationId]))c.applicationId=remap[c.applicationId]});
  db.certificates=(db.certificates||[]).filter((c,i,arr)=>!removeIds.has(c.applicationId)&&arr.findIndex(x=>x.applicationId===c.applicationId)===i);
  (db.activities||[]).forEach(x=>{if(remap[x.applicationId])x.applicationId=remap[x.applicationId]});
  db.dedupeAppliedAt=Date.now();
  save(db);
  if(showAlert)alert(`Duplicate applications cleaned: ${removeIds.size}. / Pengajuan ganda dibersihkan: ${removeIds.size}.`);
  return removeIds.size;
}
function autoCleanupOnce(){if(!db.autoDedupeV2){cleanupDuplicateApplications(false);db.autoDedupeV2=true;save(db)}}
autoCleanupOnce();
function me(){return db.users.find(u=>u.id===db.session)||null}
function requireUser(){if(!me()){route('login');return null}return me()}
function activity(appId,userId,action,details=''){db.activities.unshift({id:uid(),applicationId:appId,userId,action,details,createdAt:Date.now()});save(db)}
function certificateKind(a){const raw=String(a?.certificateCategory||a?.applicationService||'Ethical Clearance / Ethical Clearance').toLowerCase();return raw.includes('irb')?'IRB':'EC'}
function certificateLabel(a){return certificateKind(a)==='IRB'?'IRB Approval Letter / Surat Persetujuan IRB':'Ethical Clearance Certificate / Surat Keterangan Layak Etik'}
function certNo(a,issuedAt=Date.now()){const dt=new Date(issuedAt);const date=dt.getDate(),month=dt.getMonth()+1,year=dt.getFullYear();const prefix=certificateKind(a)==='IRB'?'IRB-CWCU':'EC-CWCU';const count=db.certificates.filter(c=>{const d=new Date(c.issuedAt);return String(c.certificateNumber||'').startsWith(prefix+'/')&&d.getFullYear()===year}).length+1;return `${prefix}/${month}.${date}/LT.${count}/${year}`}
function appNo(){const y=new Date().getFullYear();const count=db.applications.filter(a=>String(a.applicationNumber||'').includes(`CWCU-ECIRB-${y}`)).length+1;return `CWCU-ECIRB-${y}-${String(count).padStart(3,'0')}`}

function layout(active,inner){app.innerHTML=`<div class="shell">${nav(active)}<main class="main">${inner}</main></div>`}
function route(name,id){location.hash=id?`#${name}/${id}`:`#${name}`;render()}
function loginView(mode='login'){app.innerHTML=`<div class="loginWrap"><div class="loginCard"><div class="loginHero"><div class="seal">EC</div><h1>CWCU Research Ethics Committee</h1><p>Professional ethical clearance and IRB workflow system for protocol submission, committee assignment, reviewer recommendation, chairperson decision, certificate issuance, and certificate verification.</p><div class="notice" style="background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.18);color:#fff"><b>Default Chairperson</b><br>Email: ${DEFAULT_CHAIR_EMAIL}<br>Password: ${DEFAULT_CHAIR_PASSWORD}</div></div><div class="loginForm"><div class="eyebrow">${mode==='signup'?'Create account':'Secure access'}</div><h2 class="title">${mode==='signup'?'Register researcher':'Login to portal'}</h2><p class="subtitle">${mode==='signup'?'Researcher accounts can submit protocols. Chairperson can later change roles in Committee.':'Use your institutional account to continue.'}</p><form id="authForm" class="grid" style="margin-top:20px">${mode==='signup'?`<div class="fieldGrid"><div><label>Title</label><input name="title" placeholder="Dr."></div><div><label>Full Name</label><input name="name" required placeholder="Full name"></div></div><div><label>Affiliation</label><input name="affiliation" placeholder="Cipta Wacana University"></div>`:''}<div><label>Email</label><input name="email" type="email" required value="${mode==='login'?DEFAULT_CHAIR_EMAIL:''}"></div><div><label>Password</label><input name="password" type="password" required value="${mode==='login'?DEFAULT_CHAIR_PASSWORD:''}"></div><div class="actions"><button class="btn" type="submit">${mode==='signup'?'Create account':'Login'}</button><button class="btn secondary" type="button" onclick="route('${mode==='signup'?'login':'signup'}')">${mode==='signup'?'Back to login':'Register researcher'}</button><button class="btn secondary" type="button" onclick="route('verify')">Verify certificate</button><button class="btn secondary" type="button" onclick="openLoginImport()">Restore data</button></div></form><p id="authMsg" class="footerNote"></p></div></div></div>`;$('#authForm').onsubmit=e=>{e.preventDefault();const f=Object.fromEntries(new FormData(e.target).entries());if(mode==='login'){const u=db.users.find(x=>x.email.toLowerCase()===String(f.email).toLowerCase()&&x.password===f.password);if(!u){$('#authMsg').innerHTML='<span style="color:#b91c1c">Invalid email or password.</span>';return}db.session=u.id;save(db);route('dashboard')}else{if(db.users.some(x=>x.email.toLowerCase()===String(f.email).toLowerCase())){$('#authMsg').innerHTML='<span style="color:#b91c1c">Email already registered.</span>';return}const u={id:uid(),email:f.email,password:f.password,name:f.name,title:f.title,affiliation:f.affiliation,role:'researcher',createdAt:Date.now()};db.users.push(u);db.session=u.id;save(db);route('dashboard')}}}
function dashboard(){const u=requireUser();if(!u)return;let apps=u.role==='chair'?db.applications:db.applications.filter(a=>a.researcherId===u.id||db.assignments.some(x=>x.applicationId===a.id&&x.reviewerId===u.id));layout('dashboard',`<div class="top"><div><div class="eyebrow">Executive workspace</div><h1 class="title">Ethical Clearance Command Center</h1><p class="subtitle">Integrated protocol metadata, committee review, chairperson decision, and certificate issuance in one no-cost GitHub Pages application.</p></div><div class="actions"><button class="btn" onclick="route('new')">New Ethical Clearance / IRB</button>${u.role==='chair'?`<button class="btn secondary" onclick="route('committee')">Manage Committee</button><button class="btn secondary" onclick="cleanupDuplicateApplications(true);route('dashboard')">Clean Duplicates</button>`:''}</div></div><div class="grid grid3"><div class="stat"><span>Total protocols</span><b>${apps.length}</b></div><div class="stat"><span>Under review</span><b>${apps.filter(a=>a.status==='under_review'||a.status==='submitted'||a.status==='review_completed').length}</b></div><div class="stat"><span>Approved certificates</span><b>${db.certificates.length}</b></div></div><div class="card" style="margin-top:18px"><h3>Recent applications</h3>${tableApps(apps)}</div>`) }
function tableApps(apps){if(!apps.length)return '<p class="subtitle">No applications yet.</p>';const current=me();return `<div style="overflow:auto"><table class="table"><thead><tr><th>No.</th><th>Title</th><th>Applicant</th><th>Status</th><th>Decision date</th><th>Action</th></tr></thead><tbody>${apps.map(a=>{const r=db.users.find(u=>u.id===a.researcherId)||{};const canReview=current&&(current.role==='reviewer'||current.role==='chair')&&db.assignments.some(x=>x.applicationId===a.id&&x.reviewerId===current.id)&&!db.reviews.some(x=>x.applicationId===a.id&&x.reviewerId===current.id)&&['under_review','review_completed'].includes(a.status);return `<tr><td>${esc(a.applicationNumber||'Draft')}</td><td><b>${esc(a.title||'Untitled')}</b><br><span class="footerNote">${esc(a.reviewType||'')} · ${esc(a.riskCategory||a.riskLevel||'')}</span></td><td>${esc(r.title||'')} ${esc(r.name||'')}</td><td><span class="badge ${statusClass(a.status)}">${statuses[a.status]||a.status}</span></td><td>${a.decidedAt?dmy(a.decidedAt):'—'}</td><td><div class="actions"><button class="btn small secondary" onclick="route('app','${a.id}')">Open</button>${canReview?`<button class="btn small" onclick="reviewForm('${a.id}')">Submit Review</button>`:''}</div></td></tr>`}).join('')}</tbody></table></div>`}

function fieldValue(a,name,fallback=''){return esc(a&&a[name]!==undefined&&a[name]!==null?a[name]:fallback)}
function optionList(opts,val){return opts.map(o=>`<option value="${esc(o)}" ${String(val||'')===String(o)?'selected':''}>${esc(o)}</option>`).join('')}
function textInput(name,label,a,fallback='',type='text',required=true,desc=''){return `<div><label>${esc(label)}${required?' *':''}</label>${desc?`<div class="sectionHint">${esc(desc)}</div>`:''}<input name="${esc(name)}" type="${esc(type)}" ${required?'required':''} value="${fieldValue(a,name,fallback)}"></div>`}
function textArea(name,label,a,fallback='',required=true,desc=''){return `<div><label>${esc(label)}${required?' *':''}</label>${desc?`<div class="sectionHint">${esc(desc)}</div>`:''}<textarea name="${esc(name)}" ${required?'required':''}>${fieldValue(a,name,fallback)}</textarea></div>`}
function selectInput(name,label,opts,a,fallback='',required=true,desc=''){const val=a&&a[name]?a[name]:fallback;return `<div><label>${esc(label)}${required?' *':''}</label>${desc?`<div class="sectionHint">${esc(desc)}</div>`:''}<select name="${esc(name)}" ${required?'required':''}>${optionList(opts,val)}</select></div>`}
function checkboxGroup(name,label,opts,a,required=true,desc=''){const val=String((a&&a[name])||'').split(' | ').filter(Boolean);return `<div><label>${esc(label)}${required?' *':''}</label>${desc?`<div class="sectionHint">${esc(desc)}</div>`:''}<div class="checkGrid">${opts.map(o=>`<label class="checkItem"><input type="checkbox" name="${esc(name)}" value="${esc(o)}" ${val.includes(o)?'checked':''}> <span>${esc(o)}</span></label>`).join('')}</div></div>`}
function formSection(title,desc,inner,extra=''){return `<section class="formSection ${extra}"><div class="sectionTitle">${esc(title)}</div>${desc?`<p class="sectionHint">${esc(desc)}</p>`:''}${inner}</section>`}
function collectProtocolForm(form){const data={};const fd=new FormData(form);for(const [k,v] of fd.entries()){if(data[k]!==undefined)data[k]=data[k]+' | '+v;else data[k]=v}return data}

an','Data Deletion/Destruction Plan / Rencana Penghapusan/Pemusnahan Data',a,'',true)}</div>`));

ableRecording','Q7. Identifiable recording/photo/screenshot? / Rekaman/foto/tangkapan layar yang dapat mengidentifikasi?',yn,a,'Uncertain / Belum pasti',true)}${selectInput('selfPowerRelation','Q8. Power relationship? / Melibatkan relasi kuasa?',yn,a,'Uncertain / Belum pasti',true)}${selectInput('selfEstimatedCategory','Q9. Estimated review category / Dugaan kategori review',reviewCat,a,'Unknown / Belum Mengetahui',true)}</div><p class="sectionHint">The self-assessment does not determine the final decision. / Hasil self-assessment tidak menentukan keputusan akhir. Kategori final ditetapkan oleh sekretariat dan/atau IRB berdasarkan kelengkapan dokumen, karakteristik partisipan, jenis data, prosedur penelitian, potensi risiko, dan perlindungan etik.</p>`));

sections.push(formSection('H. Applicant Declarations / Pernyataan Pemohon','Final applicant declarations before submitting to the IRB. / Pernyataan final pemohon sebelum pengajuan dikirim ke IRB.',`<div class="fieldGrid">${selectInput('dataTruthDeclaration','Truthfulness of Data Declaration / Pernyataan Kebenaran Data',declaration1,a,declaration1[0],true)}${selectInput('electronicCommunicationConsent','Electronic Communication Consent / Persetujuan Komunikasi Elektronik',declaration2,a,declaration2[0],true)}${selectInput('irbMonitoringConsent','IRB Monitoring Consent / Persetujuan Monitoring IRB',declaration3,a,declaration3[0],true)}${selectInput('researcherResponsibilityDeclaration','Researcher Responsibility Declaration / Pernyataan Tanggung Jawab Peneliti',declaration4,a,declaration4[0],true)}</div>`));
if(u.role==='chair')sections.push(formSection('I. Admin/IRB Fields / Field Admin/IRB','These fields are completed by the secretariat, chairperson, or IRB. They are not required for applicants. / Field ini diisi oleh sekretariat, chairperson, atau IRB dan tidak wajib untuk pemohon.',`<div class="fieldGrid">${textInput('irbSubmissionNumber','IRB Submission Number / Nomor Pengajuan IRB',a,a?.applicationNumber||'','text',false)}${textInput('submissionDate','Submission Date / Tanggal Pengajuan',a,today(),'date',false)}${selectInput('adminSubmissionStatus','Submission Status / Status Pengajuan',adminStatus,a,'Submitted / Diajukan',false)}${textInput('reviewer1','Reviewer 1 / Reviewer 1',a,'','text',false)}${textInput('reviewer2','Reviewer 2 / Reviewer 2',a,'','text',false)}${selectInput('finalIrbDecision','Final IRB Decision / Keputusan Akhir IRB',finalDecision,a,'Approved / Disetujui',false)}${textInput('finalEcIrbNumber','Final EC/IRB Number / Nomor EC/IRB Final',a,'','text',false)}${textInput('approvalDate','Approval Date / Tanggal Approval',a,'','date',false)}${textInput('approvalValidity','Approval Validity Period / Masa Berlaku Approval',a,'12 months from approval date / 12 bulan sejak tanggal approval','text',false)}</div>${textArea('secretariatNotes','Secretariat Notes / Catatan Sekretariat',a,'',false)}${textArea('reviewerNotes','Reviewer Notes / Catatan Reviewer',a,'',false)}${textArea('finalDecisionNotes','Final Decision Notes / Catatan Keputusan Akhir',a,'',false)}${textInput('certificateIssuedFile','Issued Certificate File / File Certificate Issued',a,'','text',false,'Enter the final PDF certificate file name/link after issuance. / Tuliskan nama file/link PDF certificate final apabila sudah diterbitkan.')}`,'adminOnly'));
layout('new',`<div class="top"><div><div class="eyebrow">Ethical Clearance and IRB Metadata / Metadata Ethical Clearance dan IRB</div><h1 class="title">New Ethical Clearance / IRB Application<br><span style="font-size:22px;color:var(--muted)">Pengajuan Ethical Clearance / IRB Baru</span></h1><p class="subtitle">This bilingual metadata form is the first and central submission page for ethical clearance and IRB review. / Form metadata dwibahasa ini menjadi halaman awal dan utama untuk pengajuan ethical clearance dan telaah IRB.</p></div><div class="actions"><button class="btn secondary" onclick="route('dashboard')">Back / Kembali</button></div></div><form id="protocolForm" class="grid">${sections.join('')}<div class="card actions"><button class="btn" type="button" onclick="saveProtocol('${id||''}',false)">Save Draft / Simpan Draft</button><button class="btn ok" type="button" onclick="saveProtocol('${id||''}',true)">Save and Submit to IRB / Simpan dan Ajukan ke IRB</button><button class="btn secondary" type="button" onclick="route('dashboard')">Cancel / Batal</button></div></form>`);

function saveProtocol(id,submit){const u=me();const form=$('#protocolForm');if(submit&&!form.checkValidity()){const first=form.querySelector(':invalid');if(first){first.scrollIntoView({behavior:'smooth',block:'center'});setTimeout(()=>first.reportValidity(),250)}alert('Please complete all required fields before submitting to IRB. / Mohon lengkapi semua field wajib sebelum mengajukan ke IRB.');return}const f=collectProtocolForm(form);let a=id?db.applications.find(x=>x.id===id):null;if(!a){a={id:uid(),researcherId:u.id,createdAt:Date.now(),status:'draft',applicationNumber:null};db.applications.unshift(a)}Object.assign(a,f,{participantCount:+f.participantCount||0,durationMonths:+f.durationMonths||0});a.applicantName=a.applicantName||u.name;a.institution=a.institution||u.affiliation||'Cipta Wacana University';a.department=a.department||a.departmentUnit||'';a.principalInvestigator=a.principalInvestigator||u.name;a.researchType=a.researchType||'Penelitian Dosen';a.researchDesign=a.researchDesign||'Mixed Methods';a.studyType=a.subjectDataType||'Human participant research';a.abstract=a.reviewCategoryReason||a.researchBenefits||'';a.methodology=a.dataCollectionProcedure||'';a.participantType=a.participantPopulation||'';a.location=a.location||'';a.certificateCategory=a.certificateCategory||'Ethical Clearance / Ethical Clearance';if(submit){a.status='submitted';a.submittedAt=Date.now();if(!a.applicationNumber)a.applicationNumber=appNo();a.irbSubmissionNumber=a.applicationNumber;a.adminSubmissionStatus='Submitted';a.submissionDate=today()}activity(a.id,u.id,submit?'submitted':'saved',submit?'Ethical Clearance / IRB metadata submitted for administrative and ethical review.':'Ethical Clearance / IRB metadata saved as draft.');save(db);route('app',a.id)}
function submitApp(id){const a=db.applications.find(x=>x.id===id);if(a){a.status='submitted';a.submittedAt=Date.now();if(!a.applicationNumber)a.applicationNumber=appNo();a.irbSubmissionNumber=a.applicationNumber;a.adminSubmissionStatus='Submitted';a.submissionDate=today();activity(id,me().id,'submitted','Protocol submitted for review.');save(db);appDetail(id)}}
function appDetail(id){const u=requireUser();if(!u)return;const a=db.applications.find(x=>x.id===id);if(!a){route('dashboard');return}const applicant=db.users.find(x=>x.id===a.researcherId)||{};const cert=db.certificates.find(c=>c.applicationId===id);const assigns=db.assignments.filter(x=>x.applicationId===id);const revs=db.reviews.filter(x=>x.applicationId===id);const canChair=u.role==='chair';const canReviewer=(u.role==='reviewer'||u.role==='chair')&&assigns.some(x=>x.reviewerId===u.id)&&!revs.some(x=>x.reviewerId===u.id);const certInfo=cert?`<div class="notice okNotice"><b>Certificate issued / Sertifikat diterbitkan</b><br><b>${esc(cert.certificateNumber)}</b><br>${certificateLabel(a)}<br>Issued / Diterbitkan: ${dmy(cert.issuedAt)}<div class="actions" style="margin-top:10px"><button class="btn ok" onclick="showCertificate('${id}')">Open Certificate / Buka Sertifikat</button></div></div>`:`<div class="notice"><b>Certificate number will be generated automatically after approval.</b><br>Nomor sertifikat akan dibuat otomatis setelah disetujui.<br>Ethical Clearance: EC-CWCU/Month.Date/LT.Serial/Year<br>IRB: IRB-CWCU/Month.Date/LT.Serial/Year</div>`;layout('app',`<div class="top"><div><div class="eyebrow">Application Detail / Detail Pengajuan</div><h1 class="title">${esc(a.title||'Untitled Protocol')}</h1><p class="subtitle">${esc(a.applicationNumber||'Draft')} · ${esc(certificateLabel(a))} · <span class="badge ${statusClass(a.status)}">${statuses[a.status]||a.status}</span></p></div><div class="actions"><button class="btn secondary" onclick="route('dashboard')">Back / Kembali</button>${canChair?`<button class="btn secondary" onclick="route('new','${id}')">Edit Metadata / Edit Metadata</button><button class="btn" onclick="openAssign('${id}')">Assign Reviewer / Tugaskan Reviewer</button><button class="btn ok" onclick="openDecision('${id}')">Final Decision / Keputusan Final</button>`:''}${canReviewer?`<button class="btn" onclick="reviewForm('${id}')">Submit Review / Kirim Review</button>`:''}${cert?`<button class="btn ok" onclick="showCertificate('${id}')">Certificate / Sertifikat</button>`:''}</div></div><div class="grid grid2"><div class="card"><h3>Protocol Metadata / Metadata Protokol</h3><table class="certTable"><tr><td>Applicant / Pemohon</td><td>${esc(a.applicantName||applicant.name||'')}</td></tr><tr><td>Institution / Institusi</td><td>${esc(a.institution||applicant.affiliation||'')}</td></tr><tr><td>Department / Unit</td><td>${esc(a.department||'')}</td></tr><tr><td>Certificate Category / Kategori Sertifikat</td><td>${esc(certificateLabel(a))}</td></tr><tr><td>Research Type / Jenis Penelitian</td><td>${esc(a.researchType||'')}</td></tr><tr><td>Research Design / Desain Penelitian</td><td>${esc(a.researchDesign||'')}</td></tr><tr><td>Risk Category / Kategori Risiko</td><td>${esc(a.riskCategory||'')}</td></tr><tr><td>Document Link / Link Dokumen</td><td>${a.documentFolderLink?`<a href="${esc(a.documentFolderLink)}" target="_blank">Open folder</a>`:'—'}</td></tr></table></div><div class="card"><h3>Certificate / Sertifikat</h3>${certInfo}</div></div><div class="grid grid2" style="margin-top:18px"><div class="card"><h3>Reviewer Assignment / Penugasan Reviewer</h3>${assigns.length?assigns.map(x=>{const r=db.users.find(u=>u.id===x.reviewerId)||{};return `<p><b>${esc(r.title||'')} ${esc(r.name||'')}</b><br><span class="footerNote">Assigned: ${dmy(x.assignedAt)} · ${x.completedAt?'Completed: '+dmy(x.completedAt):'Pending'}</span></p>`}).join(''):'<p class="subtitle">No reviewer assigned yet.</p>'}</div><div class="card"><h3>Reviewer Reports / Laporan Reviewer</h3>${revs.length?revs.map(r=>{const ru=db.users.find(u=>u.id===r.reviewerId)||{};return `<div class="notice"><b>${esc(ru.title||'')} ${esc(ru.name||'')}</b><br>Recommendation: ${esc(r.recommendation)}<br>${esc(r.comments||'')}</div>`}).join(''):'<p class="subtitle">No review report yet.</p>'}</div></div><div class="card" style="margin-top:18px"><h3>Decision Notes / Catatan Keputusan</h3><p>${esc(a.decisionNotes||a.finalDecisionNotes||'No final decision recorded yet.')}</p></div>`)}
function inbox(){const u=requireUser();if(!u)return;const items=db.assignments.filter(x=>x.reviewerId===u.id).map(x=>db.applications.find(a=>a.id===x.applicationId)).filter(Boolean);layout('inbox',`<div class="top"><div><div class="eyebrow">Reviewer workspace</div><h1 class="title">Review Inbox</h1><p class="subtitle">Submit ethical recommendations for assigned protocols. The Chairperson retains authority for the final IRB decision.</p></div></div><div class="card">${tableApps(items)}</div>`)}
function committee(){const u=requireUser();if(!u||u.role!=='chair')return;layout('committee',`<div class="top"><div><div class="eyebrow">Governance</div><h1 class="title">Committee and Role Management</h1><p class="subtitle">Assign chairperson, reviewer, and researcher roles. This module controls access to ethical review, reviewer recommendation, and final decision authority.</p></div><button class="btn" onclick="openUser()">Add Committee Member</button></div><div class="grid grid3"><div class="stat"><span>Chairpersons</span><b>${db.users.filter(u=>u.role==='chair').length}</b></div><div class="stat"><span>Reviewers</span><b>${db.users.filter(u=>u.role==='reviewer').length}</b></div><div class="stat"><span>Researchers</span><b>${db.users.filter(u=>u.role==='researcher').length}</b></div></div><div class="card" style="margin-top:18px"><table class="table"><thead><tr><th>Name</th><th>Email</th><th>Affiliation</th><th>Role</th><th>Action</th></tr></thead><tbody>${db.users.map(x=>`<tr><td><b>${esc(x.title||'')} ${esc(x.name)}</b></td><td>${esc(x.email)}</td><td>${esc(x.affiliation||'—')}</td><td><span class="badge info">${roles[x.role]}</span></td><td><select onchange="setRole('${x.id}',this.value)"><option value="researcher" ${x.role==='researcher'?'selected':''}>Researcher</option><option value="reviewer" ${x.role==='reviewer'?'selected':''}>Reviewer</option><option value="chair" ${x.role==='chair'?'selected':''}>Chairperson</option></select></td></tr>`).join('')}</tbody></table></div>`)}
function irb(){const u=requireUser();if(!u||u.role!=='chair')return;layout('irb',`<div class="top"><div><div class="eyebrow">IRB Board</div><h1 class="title">Chairperson Decision Board</h1><p class="subtitle">Monitor submitted protocols, reviewer completion, pending decisions, and certificate issuance.</p></div><div class="actions"><button class="btn secondary" onclick="cleanupDuplicateApplications(true);route('irb')">Clean Duplicates / Bersihkan Data Ganda</button></div></div><div class="card">${tableApps(db.applications)}</div>`)}
function setRole(id,role){const chairs=db.users.filter(u=>u.role==='chair');const target=db.users.find(u=>u.id===id);if(target.role==='chair'&&role!=='chair'&&chairs.length===1){alert('At least one Chairperson must remain active.');committee();return}target.role=role;save(db);committee()}
function openUser(){modal(`<h2>Add Committee Member</h2><form id="userForm" class="grid"><div class="fieldGrid"><div><label>Title</label><input name="title"></div><div><label>Name</label><input name="name" required></div></div><div><label>Email</label><input name="email" type="email" required></div><div><label>Affiliation</label><input name="affiliation" value="Cipta Wacana University"></div><div class="fieldGrid"><div><label>Role</label><select name="role"><option value="reviewer">Reviewer</option><option value="chair">Chairperson</option><option value="researcher">Researcher</option></select></div><div><label>Temporary Password</label><input name="password" value="Welcome123!"></div></div><div class="actions"><button class="btn" type="submit">Create Member</button><button class="btn secondary" type="button" onclick="closeModal()">Cancel</button></div></form>`);$('#userForm').onsubmit=e=>{e.preventDefault();const f=Object.fromEntries(new FormData(e.target).entries());if(db.users.some(u=>u.email.toLowerCase()===String(f.email).toLowerCase())){alert('Email already registered.');return}db.users.push({id:uid(),...f,createdAt:Date.now()});save(db);closeModal();committee()}}
function openAssign(id){const reviewers=db.users.filter(u=>u.role==='reviewer'||u.role==='chair');modal(`<h2>Assign Reviewer</h2><p class="subtitle">Select one or more committee members to review this protocol.</p><form id="assignForm" class="grid">${reviewers.map(r=>`<label style="display:flex;gap:10px;align-items:center;text-transform:none;letter-spacing:0"><input style="width:auto" type="checkbox" name="reviewer" value="${r.id}" ${db.assignments.some(a=>a.applicationId===id&&a.reviewerId===r.id)?'checked':''}> ${esc(r.title||'')} ${esc(r.name)} · ${roles[r.role]}</label>`).join('')}<div class="actions"><button class="btn" type="submit">Save Assignment</button><button class="btn secondary" type="button" onclick="closeModal()">Cancel</button></div></form>`);$('#assignForm').onsubmit=e=>{e.preventDefault();const selected=[...e.target.querySelectorAll('input[name=reviewer]:checked')].map(i=>i.value);db.assignments=db.assignments.filter(a=>a.applicationId!==id);selected.forEach(rid=>db.assignments.push({id:uid(),applicationId:id,reviewerId:rid,assignedAt:Date.now(),completedAt:null}));const a=db.applications.find(x=>x.id===id);a.status='under_review';activity(id,me().id,'assigned',`${selected.length} reviewer(s) assigned.`);save(db);closeModal();appDetail(id)}}
function reviewForm(id){const a=db.applications.find(x=>x.id===id);modal(`<h2>Submit Reviewer Recommendation</h2><form id="reviewForm" class="grid"><p><b>${esc(a.title)}</b></p><div><label>Recommendation</label><select name="recommendation"><option value="approve">Approve</option><option value="minor_revision">Minor Revision</option><option value="major_revision">Major Revision</option><option value="reject">Reject</option></select></div><div><label>Ethical Review Comments</label><textarea name="comments" required></textarea></div><div class="actions"><button class="btn" type="submit">Submit Review</button><button class="btn secondary" type="button" onclick="closeModal()">Cancel</button></div></form>`);$('#reviewForm').onsubmit=e=>{e.preventDefault();const f=Object.fromEntries(new FormData(e.target).entries());db.reviews=db.reviews.filter(r=>!(r.applicationId===id&&r.reviewerId===me().id));db.reviews.push({id:uid(),applicationId:id,reviewerId:me().id,recommendation:f.recommendation,comments:f.comments,submittedAt:Date.now()});const ass=db.assignments.find(x=>x.applicationId===id&&x.reviewerId===me().id);if(ass)ass.completedAt=Date.now();const all=db.assignments.filter(x=>x.applicationId===id);if(all.length&&all.every(x=>x.completedAt))a.status='review_completed';activity(id,me().id,'reviewed',`Recommendation: ${f.recommendation}`);save(db);closeModal();appDetail(id)}}
function openDecision(id){const a=db.applications.find(x=>x.id===id);modal(`<h2>Chairperson Final Decision</h2><p class="subtitle">Final approval authority belongs only to the Chairperson. Reviewer recommendations are advisory. / Kewenangan keputusan final hanya berada pada Ketua Komite Etik.</p><form id="decideForm" class="grid"><div><label>Final Decision / Keputusan Akhir</label><select name="decision"><option value="approved">Approved / Disetujui</option><option value="revision_required">Revision Required / Perlu Revisi</option><option value="rejected">Rejected / Tidak Disetujui</option></select></div><div><label>Approval Date / Tanggal Approval</label><input name="approvalDate" type="date" value="${today()}"></div><div><label>Decision Notes / Catatan Keputusan</label><textarea name="notes">The protocol has been reviewed and the final ethical decision is recorded by the Chairperson.</textarea></div><div class="notice"><b>Automatic number format / Format nomor otomatis</b><br>Ethical Clearance: EC-CWCU/Month.Date/LT.Serial/Year<br>IRB: IRB-CWCU/Month.Date/LT.Serial/Year<br>Example: EC-CWCU/10.8/LT.1/2025 = approved on 8 October 2025.</div><div class="actions"><button class="btn ok" type="submit">Record Final Decision / Rekam Keputusan Final</button><button class="btn secondary" type="button" onclick="closeModal()">Cancel / Batal</button></div></form>`);$('#decideForm').onsubmit=e=>{e.preventDefault();const f=Object.fromEntries(new FormData(e.target).entries());const approvalMs=f.approvalDate?new Date(f.approvalDate+'T12:00:00').getTime():Date.now();a.status=f.decision;a.decision=f.decision==='approved'?'Approved':f.decision==='revision_required'?'Revision Required':'Rejected';a.decisionNotes=f.notes;a.decidedAt=approvalMs;a.decidedById=me().id;a.approvalDate=f.approvalDate||today();a.finalIrbDecision=a.decision;a.finalDecisionNotes=f.notes;if(f.decision==='approved'){let cert=db.certificates.find(c=>c.applicationId===id);if(!cert){cert={id:uid(),applicationId:id,certificateNumber:certNo(a,approvalMs),issuedAt:approvalMs,issuedById:me().id,validUntil:new Date(approvalMs+365*24*3600*1000).toISOString()};db.certificates.push(cert)}else{cert.issuedAt=approvalMs;cert.certificateNumber=cert.certificateNumber||certNo(a,approvalMs);cert.validUntil=cert.validUntil||new Date(approvalMs+365*24*3600*1000).toISOString()}a.finalEcIrbNumber=cert.certificateNumber;a.certificateIssuedFile=cert.certificateNumber.replaceAll('/','-')+'.html';a.adminSubmissionStatus='Certificate Issued'}activity(id,me().id,'decided',`${a.decision}. ${f.notes}`);save(db);closeModal();appDetail(id)}}
function verify(){app.innerHTML=`<div class="loginWrap"><div class="card" style="width:min(720px,100%)"><div class="eyebrow">Certificate verification</div><h1 class="title">Verify EC/IRB Certificate</h1><p class="subtitle">Enter an EC-CWCU or IRB-CWCU number to verify locally stored approval records.</p><form id="verifyForm" class="grid" style="margin-top:18px"><div><label>Certificate Number</label><input name="cert" placeholder="EC-CWCU/10.8/LT.1/2025 or IRB-CWCU/10.8/LT.1/2025"></div><div class="actions"><button class="btn">Verify</button><button class="btn secondary" type="button" onclick="route('login')">Back</button></div></form><div id="verifyResult"></div></div></div>`;$('#verifyForm').onsubmit=e=>{e.preventDefault();const c=String(new FormData(e.target).get('cert')||'').trim();const cert=db.certificates.find(x=>x.certificateNumber===c);if(!cert){$('#verifyResult').innerHTML='<div class="notice dangerNotice" style="margin-top:16px">No local certificate record found.</div>';return}const a=db.applications.find(x=>x.id===cert.applicationId);$('#verifyResult').innerHTML=`<div class="notice okNotice" style="margin-top:16px"><b>Verified</b><br>${esc(c)}<br>${esc(a?.title||'')}<br>Issued: ${dmy(cert.issuedAt)}</div>`}}
function backup(){const u=requireUser();if(!u||u.role!=='chair')return;layout('backup',`<div class="top"><div><div class="eyebrow">Data portability</div><h1 class="title">Backup and Restore</h1><p class="subtitle">Export local browser records as JSON and import them on another computer/browser.</p></div></div><div class="card grid"><div class="actions"><button class="btn" onclick="exportData()">Export JSON</button><label class="btn secondary" style="cursor:pointer">Import JSON<input type="file" accept="application/json" style="display:none" onchange="importData(this.files[0])"></label></div><div class="notice">Data is stored locally in this browser and website address. Export regularly. Use Import JSON after moving from pplx.app, another GitHub repository, another computer, or another browser.</div></div>`)}

function openLoginImport(){modal(`<h2>Restore Previous Data</h2><p class="subtitle">Use this when records disappeared after moving from pplx.app to GitHub Pages, changing repository link, or changing browser. GitHub Pages cannot automatically read data from a different website address, so import a JSON backup here.</p><div class="grid" style="margin-top:16px"><div class="notice"><b>Best recovery method:</b> open the old app link in the same browser, login as Chairperson, open Backup and Restore, click Export JSON, then import that file here.</div><label class="btn" style="cursor:pointer;text-align:center">Import Backup JSON<input type="file" accept="application/json" style="display:none" onchange="importData(this.files[0])"></label><div><label>Advanced: Paste localStorage JSON</label><textarea id="pasteJson" placeholder="Paste exported JSON here"></textarea></div><div class="actions"><button class="btn secondary" onclick="importPastedJson()">Import Pasted JSON</button><button class="btn secondary" onclick="closeModal()">Cancel</button></div></div>`)}
function importPastedJson(){try{const text=document.getElementById('pasteJson').value.trim();if(!text)throw new Error('empty');const data=JSON.parse(text);if(!validDb(data))throw new Error('invalid');db=data;save(db);alert('Data restored successfully.');closeModal();route('dashboard')}catch(e){alert('Invalid data. Please paste the full cwcu ethics JSON backup.')}}

function exportData(){const blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='cwcu-ethics-backup.json';a.click()}
function importData(file){if(!file)return;const r=new FileReader();r.onload=()=>{try{const data=JSON.parse(r.result);if(!validDb(data))throw new Error('invalid');db=data;save(db);alert('Backup imported successfully.');closeModal();route('dashboard')}catch(e){alert('Invalid backup file. Please import the exported CWCU Ethics JSON file.')}};r.readAsText(file)}
function showCertificate(id){const a=db.applications.find(x=>x.id===id);const cert=db.certificates.find(x=>x.applicationId===id);const chair=db.users.find(x=>x.id===cert.issuedById)||me();modal(`<div class="printbar noPrint"><button class="btn" onclick="window.print()">Print / Save as PDF</button><button class="btn secondary" onclick="downloadCertHtml('${id}')">Download HTML</button><button class="btn secondary" onclick="closeModal()">Close</button></div>${certificateHtml(a,cert,chair)}`,'wide')}
function certificateHtml(a,c,chair){
 const validUntil=c.validUntil?dmy(c.validUntil):dmy(c.issuedAt+365*24*3600*1000);
 const kind=certificateKind(a);
 const title=kind==='IRB'?'IRB APPROVAL LETTER<br>SURAT PERSETUJUAN IRB':'ETHICAL CLEARANCE CERTIFICATE<br>SURAT KETERANGAN LAYAK ETIK';
 const base=location.href.split('#')[0];
 const verifyUrl=base+'?cert='+encodeURIComponent(c.certificateNumber)+'#verify';
 const qrUrl='https://api.qrserver.com/v1/create-qr-code/?size=180x180&margin=8&data='+encodeURIComponent(c.certificateNumber+' | '+verifyUrl);
 const chairName=((chair.title||'')+' '+(chair.name||'Joko Slamet')).trim();
 return `<div class="cert"><div class="certTop"><div class="certLogo">CWCU</div><h1>CIPTA WACANA UNIVERSITY (CWCU) ETHICS REVIEW</h1><div>Research Ethics Committee / Komite Etik Penelitian</div><h2>${title}</h2><b>Number / Nomor: ${esc(c.certificateNumber)}</b></div><p>The Research Ethics Committee through the CWCU Ethics Review Portal certifies that the following research protocol has been reviewed and declared ethically acceptable for implementation.</p><p>Komite Etik Penelitian melalui CWCU Ethics Review Portal menyatakan bahwa protokol penelitian berikut telah ditelaah dan dinyatakan layak secara etik untuk dilaksanakan.</p><table class="certTable"><tr><td>Applicant Name / Nama Pemohon</td><td>${esc(a.applicantName)}</td></tr><tr><td>Institution / Asal Institusi</td><td>${esc(a.institution)}</td></tr><tr><td>Department/Unit / Program Studi</td><td>${esc(a.department)}</td></tr><tr><td>Research Title / Judul Penelitian</td><td>${esc(a.title)}</td></tr><tr><td>Certificate Category / Kategori Sertifikat</td><td>${esc(certificateLabel(a))}</td></tr><tr><td>Research Type / Jenis Penelitian</td><td>${esc(a.researchType||a.submissionType||'')}</td></tr><tr><td>Research Design / Desain Penelitian</td><td>${esc(a.researchDesign)}</td></tr><tr><td>Risk Category / Kategori Risiko</td><td>${esc(a.riskCategory)}</td></tr><tr><td>Decision / Keputusan</td><td>Approved / Disetujui</td></tr><tr><td>Date of Issue / Tanggal Penerbitan</td><td>${dmy(c.issuedAt)}</td></tr><tr><td>Validity Period / Masa Berlaku</td><td>${dmy(c.issuedAt)} - ${validUntil}</td></tr></table><p>Based on administrative and ethical review, the research protocol is declared to have met the fundamental principles of ethical research, including respect for the dignity, rights, safety, welfare, confidentiality, and autonomy of research participants. This ethical review considered the appropriateness of the research objectives, procedural feasibility, proportionality of risks and benefits, clarity of informed consent, protection of personal and/or sensitive data, and safeguards for participants, including vulnerable groups where relevant.</p><p>Berdasarkan hasil penelaahan administratif dan etik, protokol penelitian tersebut dinyatakan telah memenuhi prinsip-prinsip dasar penelitian yang etis, termasuk penghormatan terhadap martabat, hak, keselamatan, kesejahteraan, kerahasiaan, dan otonomi partisipan penelitian. Telaah etik ini mempertimbangkan kesesuaian tujuan penelitian, kelayakan prosedur, proporsionalitas risiko dan manfaat, kejelasan informed consent, perlindungan data pribadi dan/atau data sensitif, serta mekanisme perlindungan terhadap partisipan.</p><p>This review was conducted with consideration of nationally and internationally recognized research ethics principles, including the Declaration of Helsinki, CIOMS International Ethical Guidelines, and research ethics standards emphasizing scientific value, methodological validity, informed consent, participant protection, justice, confidentiality, accountability, and research integrity.</p><div class="signature"><div><b>Verification / Verifikasi</b><div class="verificationBox"><img class="qrImg" alt="QR verification code" src="${qrUrl}"><div class="verifyText"><b>Scan QR Code</b><br>No. ${esc(c.certificateNumber)}<br>${esc(base)}?cert=${encodeURIComponent(c.certificateNumber)}#verify</div></div></div><div class="signaturePanel"><p>Issued by / Diterbitkan oleh:<br>CWCU Ethics Review<br>Chair of the Ethics Committee / Ketua Komite Etik,</p><img class="sigImg" src="${CHAIR_SIGNATURE_DATA}" alt="Chairperson signature"><div class="ethicsStamp"><div><div class="outer">CWCU Research Ethics Committee</div><div class="middle">APPROVED</div><div class="inner">Ethical Clearance / IRB</div></div></div><p><b>${esc(chairName)}</b><br>Chairperson, CWCU Research Ethics Committee</p></div></div><p style="text-align:center;font-size:9pt;margin-top:20px">CWCU Ethics Review | EC/IRB Certificate | ${esc(c.certificateNumber)}</p></div>`}
function downloadCertHtml(id){const a=db.applications.find(x=>x.id===id),c=db.certificates.find(x=>x.applicationId===id),chair=db.users.find(x=>x.id===c.issuedById)||me();const html='<!doctype html><html><head><meta charset="utf-8"><title>'+esc(c.certificateNumber)+'</title><style>'+document.querySelector('style').innerHTML+'</style></head><body>'+certificateHtml(a,c,chair)+'</body></html>';const blob=new Blob([html],{type:'text/html'});const x=document.createElement('a');x.href=URL.createObjectURL(blob);x.download=c.certificateNumber.replaceAll('/','-')+'.html';x.click()}
function modal(html,wide){let m=$('#modal');if(!m){m=document.createElement('div');m.id='modal';m.className='modal';document.body.appendChild(m)}m.innerHTML=`<div class="modalBody" style="${wide?'width:min(1000px,100%)':''}">${html}</div>`;m.classList.add('show')}
function closeModal(){const m=$('#modal');if(m)m.classList.remove('show')}
function logout(){db.session=null;save(db);route('login')}
function render(){const hash=location.hash.replace('#','')||'login';const [name,id]=hash.split('/');if(name==='login')loginView('login');else if(name==='signup')loginView('signup');else if(name==='dashboard')dashboard();else if(name==='new')appForm(id);else if(name==='app')appDetail(id);else if(name==='inbox')inbox();else if(name==='committee')committee();else if(name==='irb')irb();else if(name==='verify')verify();else if(name==='backup')backup();else loginView('login')}
window.route=route;window.logout=logout;window.saveProtocol=saveProtocol;window.submitApp=submitApp;window.openAssign=openAssign;window.openDecision=openDecision;window.openUser=openUser;window.setRole=setRole;window.closeModal=closeModal;window.showCertificate=showCertificate;window.downloadCertHtml=downloadCertHtml;window.exportData=exportData;window.importData=importData;window.openLoginImport=openLoginImport;window.importPastedJson=importPastedJson;window.reviewForm=reviewForm;window.cleanupDuplicateApplications=cleanupDuplicateApplications;
window.addEventListener('hashchange',render);render();
</script>
</body>
</html>
