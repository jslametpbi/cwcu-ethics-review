<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CWCU Ethics Review Portal</title>
  <meta name="description" content="Cipta Wacana University Ethics Review Portal - static GitHub Pages edition." />
  <style>
    :root{--bg:#f7f8fb;--surface:#ffffff;--surface2:#f1f5f9;--text:#0f172a;--muted:#64748b;--border:#dbe3ee;--primary:#123c69;--primary2:#1e6091;--accent:#b8872f;--ok:#0f766e;--warn:#b45309;--danger:#b91c1c;--shadow:0 22px 55px rgba(15,23,42,.12);--radius:22px}*{box-sizing:border-box}body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--text);background:radial-gradient(circle at top left,#e8f1fb,transparent 32rem),linear-gradient(180deg,#fbfdff,var(--bg));min-height:100vh}a{color:inherit}.shell{display:grid;grid-template-columns:290px 1fr;min-height:100vh}.side{background:linear-gradient(180deg,#0f2f55,#102849);color:#fff;padding:28px 22px;position:sticky;top:0;height:100vh;box-shadow:18px 0 40px rgba(15,23,42,.16)}.brand{display:flex;gap:14px;align-items:center;margin-bottom:28px}.seal{width:48px;height:48px;border-radius:16px;background:linear-gradient(135deg,#fff,#dbeafe);color:#123c69;display:grid;place-items:center;font-weight:900;box-shadow:0 12px 30px rgba(0,0,0,.18)}.brand h1{font-size:15px;line-height:1.25;margin:0}.brand p{font-size:11px;opacity:.72;margin:3px 0 0}.nav{display:grid;gap:8px;margin-top:18px}.nav button,.ghostBtn{border:0;background:transparent;color:inherit;text-align:left;padding:12px 13px;border-radius:14px;cursor:pointer;font-weight:650;display:flex;gap:10px;align-items:center}.nav button:hover,.nav button.active{background:rgba(255,255,255,.12)}.main{padding:32px;max-width:1280px;width:100%;margin:0 auto}.top{display:flex;justify-content:space-between;gap:18px;align-items:flex-start;margin-bottom:24px}.eyebrow{font-size:12px;text-transform:uppercase;letter-spacing:.16em;color:var(--accent);font-weight:900}.title{font-size:31px;letter-spacing:-.04em;line-height:1.05;margin:8px 0 8px}.subtitle{color:var(--muted);max-width:760px;line-height:1.65;margin:0}.card{background:rgba(255,255,255,.9);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px}.grid{display:grid;gap:18px}.grid3{grid-template-columns:repeat(3,minmax(0,1fr))}.grid2{grid-template-columns:repeat(2,minmax(0,1fr))}.stat{padding:20px;border-radius:20px;border:1px solid var(--border);background:linear-gradient(180deg,#fff,#f8fafc)}.stat b{display:block;font-size:28px;margin-top:8px}.stat span{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.08em;font-weight:800}.btn{border:0;border-radius:14px;padding:11px 15px;font-weight:850;cursor:pointer;background:var(--primary);color:#fff;box-shadow:0 12px 26px rgba(18,60,105,.22)}.btn:hover{filter:brightness(1.05)}.btn.secondary{background:#fff;color:var(--primary);border:1px solid var(--border);box-shadow:none}.btn.warn{background:var(--warn)}.btn.danger{background:var(--danger)}.btn.ok{background:var(--ok)}.btn.small{padding:7px 10px;border-radius:11px;font-size:12px}.actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.table{width:100%;border-collapse:collapse}.table th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:12px;border-bottom:1px solid var(--border)}.table td{padding:14px 12px;border-bottom:1px solid var(--border);vertical-align:top}.badge{display:inline-flex;align-items:center;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:850;border:1px solid var(--border);background:#f8fafc}.badge.ok{background:#ecfdf5;color:#047857;border-color:#a7f3d0}.badge.warn{background:#fffbeb;color:#b45309;border-color:#fde68a}.badge.danger{background:#fef2f2;color:#b91c1c;border-color:#fecaca}.badge.info{background:#eff6ff;color:#1d4ed8;border-color:#bfdbfe}label{display:block;font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:#475569;font-weight:900;margin-bottom:7px}input,textarea,select{width:100%;border:1px solid var(--border);border-radius:13px;padding:11px 12px;background:#fff;color:var(--text);font:inherit}textarea{min-height:88px;resize:vertical}.fieldGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.sectionTitle{font-size:15px;font-weight:950;margin:22px 0 12px;color:#123c69}.hidden{display:none!important}.loginWrap{min-height:100vh;display:grid;place-items:center;padding:28px}.loginCard{width:min(980px,100%);display:grid;grid-template-columns:1.05fr .95fr;overflow:hidden;border-radius:28px;background:#fff;box-shadow:var(--shadow);border:1px solid var(--border)}.loginHero{padding:42px;background:linear-gradient(135deg,#0f2f55,#1e6091);color:#fff}.loginHero h1{font-size:36px;line-height:1.05;letter-spacing:-.05em}.loginHero p{line-height:1.7;opacity:.86}.loginForm{padding:38px}.notice{border:1px solid #bfdbfe;background:#eff6ff;color:#1e3a8a;border-radius:16px;padding:13px 15px;line-height:1.55;font-size:13px}.dangerNotice{border-color:#fecaca;background:#fef2f2;color:#991b1b}.okNotice{border-color:#a7f3d0;background:#ecfdf5;color:#065f46}.modal{position:fixed;inset:0;background:rgba(15,23,42,.54);display:none;place-items:center;padding:20px;z-index:30}.modal.show{display:grid}.modalBody{width:min(760px,100%);max-height:90vh;overflow:auto;background:#fff;border-radius:24px;padding:22px;box-shadow:var(--shadow)}.cert{width:210mm;min-height:297mm;background:white;color:#111;margin:0 auto;padding:20mm 18mm;border:10px double #123c69;font-family:Georgia,"Times New Roman",serif}.cert h1{text-align:center;font-size:18pt;margin:6px 0 2px;letter-spacing:.02em}.cert h2{text-align:center;font-size:13pt;margin:0 0 14px;text-decoration:underline}.cert .certTop{text-align:center;border-bottom:2px solid #123c69;padding-bottom:10px;margin-bottom:14px}.cert .certLogo{margin:auto;width:58px;height:58px;border-radius:50%;border:3px solid #123c69;display:grid;place-items:center;font-family:Arial;font-weight:900;color:#123c69}.certTable{width:100%;border-collapse:collapse;margin:12px 0;font-size:10.8pt}.certTable td{border:1px solid #aaa;padding:7px 8px;vertical-align:top}.certTable td:first-child{width:34%;font-weight:bold;background:#f3f6fb}.cert p{font-size:10.6pt;line-height:1.5;text-align:justify}.signature{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:26px}.qr{width:110px;height:110px;border:1px dashed #555;display:grid;place-items:center;text-align:center;font-size:8pt;padding:8px}.printbar{position:sticky;top:0;background:#fff;padding:12px;border-bottom:1px solid var(--border);display:flex;gap:10px;justify-content:center;z-index:1}.footerNote{font-size:11px;color:var(--muted);margin-top:14px;line-height:1.6}@media(max-width:900px){.shell{grid-template-columns:1fr}.side{position:relative;height:auto}.nav{grid-template-columns:repeat(2,minmax(0,1fr))}.main{padding:22px}.grid3,.grid2,.fieldGrid,.loginCard{grid-template-columns:1fr}.top{flex-direction:column}.cert{width:100%;min-height:auto;padding:16px;border-width:6px}.table{font-size:13px}}@media print{body{background:#fff}.shell,.printbar,.modal .printbar{display:none}.cert{border:10px double #123c69;box-shadow:none;margin:0;width:100%;min-height:auto}.modal{position:static;display:block;background:#fff;padding:0}.modalBody{box-shadow:none;max-height:none;width:100%;padding:0}.noPrint{display:none!important}}
  </style>
</head>
<body>
  <div id="app"></div>
<script>
const STORE='cwcu_ethics_static_v3';
const DEFAULT_CHAIR_EMAIL='jokoslamet@cwcu.ac.id';
const DEFAULT_CHAIR_PASSWORD='ChangeMe123!';
const roles={researcher:'Researcher',reviewer:'Reviewer',chair:'Chairperson'};
const statuses={draft:'Draft',submitted:'Submitted',under_review:'Under Review',review_completed:'Review Completed',approved:'Approved',revision_required:'Revision Required',rejected:'Rejected'};
const statusClass=s=>s==='approved'?'ok':s==='rejected'?'danger':(s==='submitted'||s==='under_review'||s==='review_completed')?'info':s==='revision_required'?'warn':'';
const $=sel=>document.querySelector(sel);
const app=$('#app');
function uid(){return crypto.randomUUID?crypto.randomUUID():'id-'+Math.random().toString(36).slice(2)+Date.now()}
function today(){return new Date().toISOString().slice(0,10)}
function dmy(t){const d=new Date(t||Date.now());return d.toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'})}
function esc(s){return String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
function load(){let db=JSON.parse(localStorage.getItem(STORE)||'null');if(!db){db={users:[{id:uid(),email:DEFAULT_CHAIR_EMAIL,password:DEFAULT_CHAIR_PASSWORD,name:'Joko Slamet',title:'Dr.',affiliation:'Cipta Wacana University',role:'chair',createdAt:Date.now()}],applications:[],reviews:[],assignments:[],certificates:[],activities:[],session:null};save(db)}return db}
function save(db){localStorage.setItem(STORE,JSON.stringify(db))}
let db=load();
function me(){return db.users.find(u=>u.id===db.session)||null}
function requireUser(){if(!me()){route('login');return null}return me()}
function activity(appId,userId,action,details=''){db.activities.unshift({id:uid(),applicationId:appId,userId,action,details,createdAt:Date.now()});save(db)}
function certNo(){const dt=new Date();const day=dt.getDate(),month=dt.getMonth()+1,year=dt.getFullYear();const count=db.certificates.filter(c=>{const d=new Date(c.issuedAt);return d.getFullYear()===year&&d.getMonth()===dt.getMonth()}).length+1;return `EC-CWCU/${day}.${month}/LT.${count}/${year}`}
function appNo(){const y=new Date().getFullYear();const count=db.applications.filter(a=>String(a.applicationNumber||'').includes(`CWCU-EC-${y}`)).length+1;return `CWCU-EC-${y}-${String(count).padStart(3,'0')}`}
function nav(active){const u=me();return `<aside class="side"><div class="brand"><div class="seal">EC</div><div><h1>CWCU Ethics Review Portal</h1><p>Executive IRB Workflow System</p></div></div>${u?`<div class="notice" style="background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.16);color:#fff"><b>${esc(u.title)} ${esc(u.name)}</b><br>${roles[u.role]}</div>`:''}<div class="nav">${u?`
<button class="${active==='dashboard'?'active':''}" onclick="route('dashboard')">⌂ Dashboard</button>
<button class="${active==='new'?'active':''}" onclick="route('new')">＋ New Protocol</button>
${(u.role==='reviewer'||u.role==='chair')?`<button class="${active==='inbox'?'active':''}" onclick="route('inbox')">□ Review Inbox</button>`:''}
${u.role==='chair'?`<button class="${active==='committee'?'active':''}" onclick="route('committee')">◉ Committee</button><button class="${active==='irb'?'active':''}" onclick="route('irb')">◆ IRB Board</button><button class="${active==='backup'?'active':''}" onclick="route('backup')">⇄ Backup</button>`:''}
<button onclick="logout()">↩ Logout</button>`:`<button class="${active==='login'?'active':''}" onclick="route('login')">Login</button><button class="${active==='signup'?'active':''}" onclick="route('signup')">Register</button><button class="${active==='verify'?'active':''}" onclick="route('verify')">Verify Certificate</button>`}</div><p class="footerNote">Static GitHub Pages edition. No API key, no database server, no external backend.</p></aside>`}
function layout(active,inner){app.innerHTML=`<div class="shell">${nav(active)}<main class="main">${inner}</main></div>`}
function route(name,id){location.hash=id?`#${name}/${id}`:`#${name}`;render()}
function loginView(mode='login'){app.innerHTML=`<div class="loginWrap"><div class="loginCard"><div class="loginHero"><div class="seal">EC</div><h1>CWCU Research Ethics Committee</h1><p>Professional ethical clearance and IRB workflow system for protocol submission, committee assignment, reviewer recommendation, chairperson decision, certificate issuance, and certificate verification.</p><div class="notice" style="background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.18);color:#fff"><b>Default Chairperson</b><br>Email: ${DEFAULT_CHAIR_EMAIL}<br>Password: ${DEFAULT_CHAIR_PASSWORD}</div></div><div class="loginForm"><div class="eyebrow">${mode==='signup'?'Create account':'Secure access'}</div><h2 class="title">${mode==='signup'?'Register researcher':'Login to portal'}</h2><p class="subtitle">${mode==='signup'?'Researcher accounts can submit protocols. Chairperson can later change roles in Committee.':'Use your institutional account to continue.'}</p><form id="authForm" class="grid" style="margin-top:20px">${mode==='signup'?`<div class="fieldGrid"><div><label>Title</label><input name="title" placeholder="Dr."></div><div><label>Full Name</label><input name="name" required placeholder="Full name"></div></div><div><label>Affiliation</label><input name="affiliation" placeholder="Cipta Wacana University"></div>`:''}<div><label>Email</label><input name="email" type="email" required value="${mode==='login'?DEFAULT_CHAIR_EMAIL:''}"></div><div><label>Password</label><input name="password" type="password" required value="${mode==='login'?DEFAULT_CHAIR_PASSWORD:''}"></div><div class="actions"><button class="btn" type="submit">${mode==='signup'?'Create account':'Login'}</button><button class="btn secondary" type="button" onclick="route('${mode==='signup'?'login':'signup'}')">${mode==='signup'?'Back to login':'Register researcher'}</button><button class="btn secondary" type="button" onclick="route('verify')">Verify certificate</button></div></form><p id="authMsg" class="footerNote"></p></div></div></div>`;$('#authForm').onsubmit=e=>{e.preventDefault();const f=Object.fromEntries(new FormData(e.target).entries());if(mode==='login'){const u=db.users.find(x=>x.email.toLowerCase()===String(f.email).toLowerCase()&&x.password===f.password);if(!u){$('#authMsg').innerHTML='<span style="color:#b91c1c">Invalid email or password.</span>';return}db.session=u.id;save(db);route('dashboard')}else{if(db.users.some(x=>x.email.toLowerCase()===String(f.email).toLowerCase())){$('#authMsg').innerHTML='<span style="color:#b91c1c">Email already registered.</span>';return}const u={id:uid(),email:f.email,password:f.password,name:f.name,title:f.title,affiliation:f.affiliation,role:'researcher',createdAt:Date.now()};db.users.push(u);db.session=u.id;save(db);route('dashboard')}}}
function dashboard(){const u=requireUser();if(!u)return;let apps=u.role==='chair'?db.applications:db.applications.filter(a=>a.researcherId===u.id||db.assignments.some(x=>x.applicationId===a.id&&x.reviewerId===u.id));layout('dashboard',`<div class="top"><div><div class="eyebrow">Executive workspace</div><h1 class="title">Ethical Clearance Command Center</h1><p class="subtitle">Integrated protocol metadata, committee review, chairperson decision, and certificate issuance in one no-cost GitHub Pages application.</p></div><div class="actions"><button class="btn" onclick="route('new')">New Protocol</button>${u.role==='chair'?`<button class="btn secondary" onclick="route('committee')">Manage Committee</button>`:''}</div></div><div class="grid grid3"><div class="stat"><span>Total protocols</span><b>${apps.length}</b></div><div class="stat"><span>Under review</span><b>${apps.filter(a=>a.status==='under_review'||a.status==='submitted'||a.status==='review_completed').length}</b></div><div class="stat"><span>Approved certificates</span><b>${db.certificates.length}</b></div></div><div class="card" style="margin-top:18px"><h3>Recent applications</h3>${tableApps(apps)}</div>`) }
function tableApps(apps){if(!apps.length)return '<p class="subtitle">No applications yet.</p>';const current=me();return `<div style="overflow:auto"><table class="table"><thead><tr><th>No.</th><th>Title</th><th>Applicant</th><th>Status</th><th>Decision date</th><th>Action</th></tr></thead><tbody>${apps.map(a=>{const r=db.users.find(u=>u.id===a.researcherId)||{};const canReview=current&&(current.role==='reviewer'||current.role==='chair')&&db.assignments.some(x=>x.applicationId===a.id&&x.reviewerId===current.id)&&!db.reviews.some(x=>x.applicationId===a.id&&x.reviewerId===current.id)&&['under_review','review_completed'].includes(a.status);return `<tr><td>${esc(a.applicationNumber||'Draft')}</td><td><b>${esc(a.title||'Untitled')}</b><br><span class="footerNote">${esc(a.reviewType||'')} · ${esc(a.riskCategory||a.riskLevel||'')}</span></td><td>${esc(r.title||'')} ${esc(r.name||'')}</td><td><span class="badge ${statusClass(a.status)}">${statuses[a.status]||a.status}</span></td><td>${a.decidedAt?dmy(a.decidedAt):'—'}</td><td><div class="actions"><button class="btn small secondary" onclick="route('app','${a.id}')">Open</button>${canReview?`<button class="btn small" onclick="reviewForm('${a.id}')">Submit Review</button>`:''}</div></td></tr>`}).join('')}</tbody></table></div>`}
function appForm(id){const u=requireUser();if(!u)return;let a=id?db.applications.find(x=>x.id===id):null;if(id&&!a){dashboard();return}layout('new',`<div class="top"><div><div class="eyebrow">Protocol submission</div><h1 class="title">Integrated Ethical Clearance Metadata</h1><p class="subtitle">Complete applicant details, research design, participant protection, risk category, consent, data protection, and committee notes.</p></div></div><form id="protocolForm" class="card grid"><div class="sectionTitle">A. Applicant and Institutional Metadata</div><div class="fieldGrid"><div><label>Applicant Name</label><input name="applicantName" value="${esc(a?.applicantName||u.name)}"></div><div><label>Institution</label><input name="institution" value="${esc(a?.institution||u.affiliation||'Cipta Wacana University')}"></div><div><label>Department / Unit / Study Program</label><input name="department" value="${esc(a?.department||'')}"></div><div><label>Principal Investigator</label><input name="principalInvestigator" value="${esc(a?.principalInvestigator||u.name)}"></div></div><div><label>Research Title</label><input name="title" required value="${esc(a?.title||'')}"></div><div class="fieldGrid"><div><label>Research Type</label><select name="researchType"><option ${sel(a?.researchType,'Thesis/Dissertation')}>Thesis/Dissertation</option><option ${sel(a?.researchType,'Institutional Research')}>Institutional Research</option><option ${sel(a?.researchType,'Funded Research')}>Funded Research</option><option ${sel(a?.researchType,'Classroom Research')}>Classroom Research</option></select></div><div><label>Research Design</label><input name="researchDesign" value="${esc(a?.researchDesign||'Mixed-methods / quantitative / qualitative')}"></div><div><label>Study Type</label><select name="studyType"><option ${sel(a?.studyType,'Human participant research')}>Human participant research</option><option ${sel(a?.studyType,'Educational research')}>Educational research</option><option ${sel(a?.studyType,'Survey/interview research')}>Survey/interview research</option><option ${sel(a?.studyType,'Secondary data')}>Secondary data</option></select></div><div><label>Risk Category</label><select name="riskCategory"><option ${sel(a?.riskCategory,'Minimal Risk')}>Minimal Risk</option><option ${sel(a?.riskCategory,'Low Risk')}>Low Risk</option><option ${sel(a?.riskCategory,'Moderate Risk')}>Moderate Risk</option><option ${sel(a?.riskCategory,'More than Minimal Risk')}>More than Minimal Risk</option></select></div></div><div class="sectionTitle">B. Ethical Review Content</div><div><label>Abstract / Study Rationale</label><textarea name="abstract">${esc(a?.abstract||'')}</textarea></div><div><label>Methodology and Procedures</label><textarea name="methodology">${esc(a?.methodology||'')}</textarea></div><div class="fieldGrid"><div><label>Participant Type</label><input name="participantType" value="${esc(a?.participantType||'Undergraduate students / adult participants')}"></div><div><label>Number of Participants</label><input name="participantCount" type="number" value="${esc(a?.participantCount||'0')}"></div><div><label>Research Location</label><input name="location" value="${esc(a?.location||'')}"></div><div><label>Duration Months</label><input name="durationMonths" type="number" value="${esc(a?.durationMonths||'6')}"></div></div><div><label>Informed Consent Process</label><textarea name="consentProcess">${esc(a?.consentProcess||'Participants will receive an information sheet and provide informed consent before data collection.')}</textarea></div><div><label>Confidentiality and Data Protection</label><textarea name="confidentialityPlan">${esc(a?.confidentialityPlan||'Data will be anonymised, stored securely, and accessed only by authorised researchers.')}</textarea></div><div><label>Risk Mitigation and Participant Safeguards</label><textarea name="riskMitigation">${esc(a?.riskMitigation||'Potential risks will be minimized through voluntary participation, withdrawal rights, confidentiality, and secure data handling.')}</textarea></div><div><label>Reviewer/Committee Notes</label><textarea name="committeeNotes">${esc(a?.committeeNotes||'')}</textarea></div><div class="actions"><button class="btn" type="submit">Save Draft</button><button class="btn ok" type="button" onclick="saveProtocol('${id||''}',true)">Save and Submit</button><button class="btn secondary" type="button" onclick="route('dashboard')">Cancel</button></div></form>`);$('#protocolForm').onsubmit=e=>{e.preventDefault();saveProtocol(id,false)}}
function sel(v,x){return (v||'')===x?'selected':''}
function saveProtocol(id,submit){const u=me();const form=$('#protocolForm');const f=Object.fromEntries(new FormData(form).entries());let a=id?db.applications.find(x=>x.id===id):null;if(!a){a={id:uid(),researcherId:u.id,createdAt:Date.now(),status:'draft',applicationNumber:null};db.applications.unshift(a)}Object.assign(a,f,{participantCount:+f.participantCount||0,durationMonths:+f.durationMonths||0});if(submit){a.status='submitted';a.submittedAt=Date.now();if(!a.applicationNumber)a.applicationNumber=appNo()}activity(a.id,u.id,submit?'submitted':'saved',submit?'Protocol submitted for administrative and ethical review.':'Draft metadata saved.');save(db);route('app',a.id)}
function appDetail(id){const u=requireUser();if(!u)return;const a=db.applications.find(x=>x.id===id);if(!a){dashboard();return}const researcher=db.users.find(x=>x.id===a.researcherId)||{};const assigns=db.assignments.filter(x=>x.applicationId===id);const reviews=db.reviews.filter(x=>x.applicationId===id);const cert=db.certificates.find(x=>x.applicationId===id);layout('irb',`<div class="top"><div><div class="eyebrow">${esc(a.applicationNumber||'Draft')}</div><h1 class="title">${esc(a.title||'Untitled protocol')}</h1><p class="subtitle">${esc(researcher.title||'')} ${esc(researcher.name||'')} · ${esc(a.institution||researcher.affiliation||'')}</p></div><div class="actions">${a.status==='draft'&&a.researcherId===u.id?`<button class="btn secondary" onclick="route('new','${id}')">Edit</button><button class="btn ok" onclick="submitApp('${id}')">Submit</button>`:''}${u.role==='chair'&&['submitted','under_review','review_completed'].includes(a.status)?`<button class="btn" onclick="openAssign('${id}')">Assign Reviewer</button><button class="btn ok" onclick="openDecision('${id}')">Final Decision</button>`:''}${(u.role==='reviewer'||u.role==='chair')&&assigns.some(x=>x.reviewerId===u.id)&&!reviews.some(x=>x.reviewerId===u.id)&&['under_review','review_completed'].includes(a.status)?`<button class="btn" onclick="reviewForm('${id}')">Submit Review</button>`:''}${a.status==='approved'&&cert?`<button class="btn ok" onclick="showCertificate('${id}')">Open Certificate</button>`:''}</div></div><div class="grid grid2"><div class="card"><h3>Protocol metadata</h3>${details(a)}</div><div class="card"><h3>Workflow status</h3><p><span class="badge ${statusClass(a.status)}">${statuses[a.status]}</span></p><p><b>Submitted:</b> ${a.submittedAt?dmy(a.submittedAt):'—'}</p><p><b>Decision:</b> ${a.decision?esc(a.decision):'—'}</p><p><b>Certificate:</b> ${cert?esc(cert.certificateNumber):'—'}</p></div></div><div class="grid grid2" style="margin-top:18px"><div class="card"><h3>Reviewer assignment</h3>${assigns.length?assigns.map(x=>{const r=db.users.find(u=>u.id===x.reviewerId)||{};return `<p><b>${esc(r.title||'')} ${esc(r.name||'')}</b><br><span class="footerNote">Assigned ${dmy(x.assignedAt)} ${x.completedAt?'· Completed '+dmy(x.completedAt):''}</span></p>`}).join(''):'<p class="subtitle">No reviewer assigned.</p>'}</div><div class="card"><h3>Reviewer recommendations</h3>${reviews.length?reviews.map(r=>{const rev=db.users.find(u=>u.id===r.reviewerId)||{};return `<p><b>${esc(rev.title||'')} ${esc(rev.name||'')}:</b> ${esc(r.recommendation)}<br>${esc(r.comments)}</p>`}).join(''):'<p class="subtitle">No review submitted.</p>'}</div></div><div class="card" style="margin-top:18px"><h3>Activity log</h3>${db.activities.filter(x=>x.applicationId===id).map(x=>`<p class="footerNote"><b>${dmy(x.createdAt)}</b> · ${esc(x.action)} · ${esc(x.details)}</p>`).join('')||'<p class="subtitle">No activity yet.</p>'}</div>`)}
function details(a){const rows=[['Applicant Name',a.applicantName],['Institution',a.institution],['Department/Unit',a.department],['Principal Investigator',a.principalInvestigator],['Research Type',a.researchType],['Research Design',a.researchDesign],['Study Type',a.studyType],['Risk Category',a.riskCategory],['Participants',`${a.participantType||''} (${a.participantCount||0})`],['Location',a.location],['Duration',`${a.durationMonths||0} months`],['Consent Process',a.consentProcess],['Confidentiality Plan',a.confidentialityPlan],['Risk Mitigation',a.riskMitigation]];return `<table class="certTable" style="font-family:inherit;font-size:13px">${rows.map(r=>`<tr><td>${esc(r[0])}</td><td>${esc(r[1]||'—')}</td></tr>`).join('')}</table>`}
function submitApp(id){const a=db.applications.find(x=>x.id===id);if(a){a.status='submitted';a.submittedAt=Date.now();if(!a.applicationNumber)a.applicationNumber=appNo();activity(id,me().id,'submitted','Protocol submitted for review.');save(db);appDetail(id)}}
function inbox(){const u=requireUser();if(!u)return;const items=db.assignments.filter(x=>x.reviewerId===u.id).map(x=>db.applications.find(a=>a.id===x.applicationId)).filter(Boolean);layout('inbox',`<div class="top"><div><div class="eyebrow">Reviewer workspace</div><h1 class="title">Review Inbox</h1><p class="subtitle">Submit ethical recommendations for assigned protocols. The Chairperson retains authority for the final IRB decision.</p></div></div><div class="card">${tableApps(items)}</div>`)}
function committee(){const u=requireUser();if(!u||u.role!=='chair')return;layout('committee',`<div class="top"><div><div class="eyebrow">Governance</div><h1 class="title">Committee and Role Management</h1><p class="subtitle">Assign chairperson, reviewer, and researcher roles. This module controls access to ethical review, reviewer recommendation, and final decision authority.</p></div><button class="btn" onclick="openUser()">Add Committee Member</button></div><div class="grid grid3"><div class="stat"><span>Chairpersons</span><b>${db.users.filter(u=>u.role==='chair').length}</b></div><div class="stat"><span>Reviewers</span><b>${db.users.filter(u=>u.role==='reviewer').length}</b></div><div class="stat"><span>Researchers</span><b>${db.users.filter(u=>u.role==='researcher').length}</b></div></div><div class="card" style="margin-top:18px"><table class="table"><thead><tr><th>Name</th><th>Email</th><th>Affiliation</th><th>Role</th><th>Action</th></tr></thead><tbody>${db.users.map(x=>`<tr><td><b>${esc(x.title||'')} ${esc(x.name)}</b></td><td>${esc(x.email)}</td><td>${esc(x.affiliation||'—')}</td><td><span class="badge info">${roles[x.role]}</span></td><td><select onchange="setRole('${x.id}',this.value)"><option value="researcher" ${x.role==='researcher'?'selected':''}>Researcher</option><option value="reviewer" ${x.role==='reviewer'?'selected':''}>Reviewer</option><option value="chair" ${x.role==='chair'?'selected':''}>Chairperson</option></select></td></tr>`).join('')}</tbody></table></div>`)}
function irb(){const u=requireUser();if(!u||u.role!=='chair')return;layout('irb',`<div class="top"><div><div class="eyebrow">IRB Board</div><h1 class="title">Chairperson Decision Board</h1><p class="subtitle">Monitor submitted protocols, reviewer completion, pending decisions, and certificate issuance.</p></div></div><div class="card">${tableApps(db.applications)}</div>`)}
function setRole(id,role){const chairs=db.users.filter(u=>u.role==='chair');const target=db.users.find(u=>u.id===id);if(target.role==='chair'&&role!=='chair'&&chairs.length===1){alert('At least one Chairperson must remain active.');committee();return}target.role=role;save(db);committee()}
function openUser(){modal(`<h2>Add Committee Member</h2><form id="userForm" class="grid"><div class="fieldGrid"><div><label>Title</label><input name="title"></div><div><label>Name</label><input name="name" required></div></div><div><label>Email</label><input name="email" type="email" required></div><div><label>Affiliation</label><input name="affiliation" value="Cipta Wacana University"></div><div class="fieldGrid"><div><label>Role</label><select name="role"><option value="reviewer">Reviewer</option><option value="chair">Chairperson</option><option value="researcher">Researcher</option></select></div><div><label>Temporary Password</label><input name="password" value="Welcome123!"></div></div><div class="actions"><button class="btn" type="submit">Create Member</button><button class="btn secondary" type="button" onclick="closeModal()">Cancel</button></div></form>`);$('#userForm').onsubmit=e=>{e.preventDefault();const f=Object.fromEntries(new FormData(e.target).entries());if(db.users.some(u=>u.email.toLowerCase()===String(f.email).toLowerCase())){alert('Email already registered.');return}db.users.push({id:uid(),...f,createdAt:Date.now()});save(db);closeModal();committee()}}
function openAssign(id){const reviewers=db.users.filter(u=>u.role==='reviewer'||u.role==='chair');modal(`<h2>Assign Reviewer</h2><p class="subtitle">Select one or more committee members to review this protocol.</p><form id="assignForm" class="grid">${reviewers.map(r=>`<label style="display:flex;gap:10px;align-items:center;text-transform:none;letter-spacing:0"><input style="width:auto" type="checkbox" name="reviewer" value="${r.id}" ${db.assignments.some(a=>a.applicationId===id&&a.reviewerId===r.id)?'checked':''}> ${esc(r.title||'')} ${esc(r.name)} · ${roles[r.role]}</label>`).join('')}<div class="actions"><button class="btn" type="submit">Save Assignment</button><button class="btn secondary" type="button" onclick="closeModal()">Cancel</button></div></form>`);$('#assignForm').onsubmit=e=>{e.preventDefault();const selected=[...e.target.querySelectorAll('input[name=reviewer]:checked')].map(i=>i.value);db.assignments=db.assignments.filter(a=>a.applicationId!==id);selected.forEach(rid=>db.assignments.push({id:uid(),applicationId:id,reviewerId:rid,assignedAt:Date.now(),completedAt:null}));const a=db.applications.find(x=>x.id===id);a.status='under_review';activity(id,me().id,'assigned',`${selected.length} reviewer(s) assigned.`);save(db);closeModal();appDetail(id)}}
function reviewForm(id){const a=db.applications.find(x=>x.id===id);modal(`<h2>Submit Reviewer Recommendation</h2><form id="reviewForm" class="grid"><p><b>${esc(a.title)}</b></p><div><label>Recommendation</label><select name="recommendation"><option value="approve">Approve</option><option value="minor_revision">Minor Revision</option><option value="major_revision">Major Revision</option><option value="reject">Reject</option></select></div><div><label>Ethical Review Comments</label><textarea name="comments" required></textarea></div><div class="actions"><button class="btn" type="submit">Submit Review</button><button class="btn secondary" type="button" onclick="closeModal()">Cancel</button></div></form>`);$('#reviewForm').onsubmit=e=>{e.preventDefault();const f=Object.fromEntries(new FormData(e.target).entries());db.reviews=db.reviews.filter(r=>!(r.applicationId===id&&r.reviewerId===me().id));db.reviews.push({id:uid(),applicationId:id,reviewerId:me().id,recommendation:f.recommendation,comments:f.comments,submittedAt:Date.now()});const ass=db.assignments.find(x=>x.applicationId===id&&x.reviewerId===me().id);if(ass)ass.completedAt=Date.now();const all=db.assignments.filter(x=>x.applicationId===id);if(all.length&&all.every(x=>x.completedAt))a.status='review_completed';activity(id,me().id,'reviewed',`Recommendation: ${f.recommendation}`);save(db);closeModal();appDetail(id)}}
function openDecision(id){const a=db.applications.find(x=>x.id===id);modal(`<h2>Chairperson Final Decision</h2><p class="subtitle">Final approval authority belongs only to the Chairperson. Reviewer recommendations are advisory.</p><form id="decideForm" class="grid"><div><label>Decision</label><select name="decision"><option value="approved">Approved</option><option value="revision_required">Revision Required</option><option value="rejected">Rejected</option></select></div><div><label>Decision Notes</label><textarea name="notes">The protocol has been reviewed and the final ethical decision is recorded by the Chairperson.</textarea></div><div class="actions"><button class="btn ok" type="submit">Record Final Decision</button><button class="btn secondary" type="button" onclick="closeModal()">Cancel</button></div></form>`);$('#decideForm').onsubmit=e=>{e.preventDefault();const f=Object.fromEntries(new FormData(e.target).entries());a.status=f.decision;a.decision=f.decision==='approved'?'Approved':f.decision==='revision_required'?'Revision Required':'Rejected';a.decisionNotes=f.notes;a.decidedAt=Date.now();a.decidedById=me().id;if(f.decision==='approved'&&!db.certificates.some(c=>c.applicationId===id)){db.certificates.push({id:uid(),applicationId:id,certificateNumber:certNo(),issuedAt:Date.now(),issuedById:me().id,validUntil:new Date(Date.now()+365*24*3600*1000).toISOString()})}activity(id,me().id,'decided',`${a.decision}. ${f.notes}`);save(db);closeModal();appDetail(id)}}
function verify(){app.innerHTML=`<div class="loginWrap"><div class="card" style="width:min(720px,100%)"><div class="eyebrow">Certificate verification</div><h1 class="title">Verify Ethical Clearance Certificate</h1><p class="subtitle">Enter a certificate number to verify locally stored approval records.</p><form id="verifyForm" class="grid" style="margin-top:18px"><div><label>Certificate Number</label><input name="cert" placeholder="EC-CWCU/7.5/LT.1/2026"></div><div class="actions"><button class="btn">Verify</button><button class="btn secondary" type="button" onclick="route('login')">Back</button></div></form><div id="verifyResult"></div></div></div>`;$('#verifyForm').onsubmit=e=>{e.preventDefault();const c=String(new FormData(e.target).get('cert')||'').trim();const cert=db.certificates.find(x=>x.certificateNumber===c);if(!cert){$('#verifyResult').innerHTML='<div class="notice dangerNotice" style="margin-top:16px">No local certificate record found.</div>';return}const a=db.applications.find(x=>x.id===cert.applicationId);$('#verifyResult').innerHTML=`<div class="notice okNotice" style="margin-top:16px"><b>Verified</b><br>${esc(c)}<br>${esc(a?.title||'')}<br>Issued: ${dmy(cert.issuedAt)}</div>`}}
function backup(){const u=requireUser();if(!u||u.role!=='chair')return;layout('backup',`<div class="top"><div><div class="eyebrow">Data portability</div><h1 class="title">Backup and Restore</h1><p class="subtitle">Export local browser records as JSON and import them on another computer/browser.</p></div></div><div class="card grid"><div class="actions"><button class="btn" onclick="exportData()">Export JSON</button><label class="btn secondary" style="cursor:pointer">Import JSON<input type="file" accept="application/json" style="display:none" onchange="importData(this.files[0])"></label></div><div class="notice">Data is stored locally in this browser. Export regularly for safekeeping.</div></div>`)}
function exportData(){const blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='cwcu-ethics-backup.json';a.click()}
function importData(file){if(!file)return;const r=new FileReader();r.onload=()=>{try{db=JSON.parse(r.result);save(db);alert('Backup imported.');route('dashboard')}catch{alert('Invalid backup file.')}};r.readAsText(file)}
function showCertificate(id){const a=db.applications.find(x=>x.id===id);const cert=db.certificates.find(x=>x.applicationId===id);const chair=db.users.find(x=>x.id===cert.issuedById)||me();modal(`<div class="printbar noPrint"><button class="btn" onclick="window.print()">Print / Save as PDF</button><button class="btn secondary" onclick="downloadCertHtml('${id}')">Download HTML</button><button class="btn secondary" onclick="closeModal()">Close</button></div>${certificateHtml(a,cert,chair)}`,'wide')}
function certificateHtml(a,c,chair){const validUntil=c.validUntil?dmy(c.validUntil):dmy(c.issuedAt+365*24*3600*1000);return `<div class="cert"><div class="certTop"><div class="certLogo">CWCU</div><h1>CIPTA WACANA UNIVERSITY (CWCU) ETHICS REVIEW</h1><div>Research Ethics Committee</div><h2>ETHICAL CLEARANCE CERTIFICATE<br>SURAT KETERANGAN LAYAK ETIK</h2><b>Number / Nomor: ${esc(c.certificateNumber)}</b></div><p>The Research Ethics Committee through the CWCU Ethics Review Portal certifies that the following research protocol has been reviewed and declared ethically acceptable for implementation.</p><p>Komite Etik Penelitian melalui CWCU Ethics Review Portal menyatakan bahwa protokol penelitian berikut telah ditelaah dan dinyatakan layak secara etik untuk dilaksanakan.</p><table class="certTable"><tr><td>Applicant Name / Nama Pemohon</td><td>${esc(a.applicantName)}</td></tr><tr><td>Institution / Asal Institusi</td><td>${esc(a.institution)}</td></tr><tr><td>Department/Unit / Program Studi</td><td>${esc(a.department)}</td></tr><tr><td>Research Title / Judul Penelitian</td><td>${esc(a.title)}</td></tr><tr><td>Research Type / Jenis Penelitian</td><td>${esc(a.researchType)}</td></tr><tr><td>Research Design / Desain Penelitian</td><td>${esc(a.researchDesign)}</td></tr><tr><td>Risk Category / Kategori Risiko</td><td>${esc(a.riskCategory)}</td></tr><tr><td>Decision / Keputusan</td><td>Approved</td></tr><tr><td>Date of Issue / Tanggal Penerbitan</td><td>${dmy(c.issuedAt)}</td></tr><tr><td>Validity Period / Masa Berlaku</td><td>${dmy(c.issuedAt)} - ${validUntil}</td></tr></table><p>Based on administrative and ethical review, the research protocol is declared to have met the fundamental principles of ethical research, including respect for the dignity, rights, safety, welfare, confidentiality, and autonomy of research participants. This ethical review considered the appropriateness of the research objectives, procedural feasibility, proportionality of risks and benefits, clarity of informed consent, protection of personal and/or sensitive data, and safeguards for participants, including vulnerable groups where relevant.</p><p>Berdasarkan hasil penelaahan administratif dan etik, protokol penelitian tersebut dinyatakan telah memenuhi prinsip-prinsip dasar penelitian yang etis, termasuk penghormatan terhadap martabat, hak, keselamatan, kesejahteraan, kerahasiaan, dan otonomi partisipan penelitian. Telaah etik ini mempertimbangkan kesesuaian tujuan penelitian, kelayakan prosedur, proporsionalitas risiko dan manfaat, kejelasan informed consent, perlindungan data pribadi dan/atau data sensitif, serta mekanisme perlindungan terhadap partisipan.</p><p>This review was conducted with consideration of nationally and internationally recognized research ethics principles, including the Declaration of Helsinki, CIOMS International Ethical Guidelines, and research ethics standards emphasizing scientific value, methodological validity, informed consent, participant protection, justice, confidentiality, accountability, and research integrity.</p><div class="signature"><div><div class="qr">Verification:<br>${esc(c.certificateNumber)}<br>${location.href.split('#')[0]}#verify</div></div><div style="text-align:center"><p>Issued by / Diterbitkan oleh:<br>CWCU Ethics Review<br>Chair of the Ethics Committee / Ketua Komite Etik,</p><br><br><p><b>${esc(chair.title||'')} ${esc(chair.name||'Joko Slamet')}</b><br>Chairperson, CWCU Research Ethics Committee</p></div></div><p style="text-align:center;font-size:9pt;margin-top:20px">CWCU Ethics Review | Ethical Clearance Certificate</p></div>`}
function downloadCertHtml(id){const a=db.applications.find(x=>x.id===id),c=db.certificates.find(x=>x.applicationId===id),chair=db.users.find(x=>x.id===c.issuedById)||me();const html='<!doctype html><html><head><meta charset="utf-8"><title>'+esc(c.certificateNumber)+'</title><style>'+document.querySelector('style').innerHTML+'</style></head><body>'+certificateHtml(a,c,chair)+'</body></html>';const blob=new Blob([html],{type:'text/html'});const x=document.createElement('a');x.href=URL.createObjectURL(blob);x.download=c.certificateNumber.replaceAll('/','-')+'.html';x.click()}
function modal(html,wide){let m=$('#modal');if(!m){m=document.createElement('div');m.id='modal';m.className='modal';document.body.appendChild(m)}m.innerHTML=`<div class="modalBody" style="${wide?'width:min(1000px,100%)':''}">${html}</div>`;m.classList.add('show')}
function closeModal(){const m=$('#modal');if(m)m.classList.remove('show')}
function logout(){db.session=null;save(db);route('login')}
function render(){const hash=location.hash.replace('#','')||'login';const [name,id]=hash.split('/');if(name==='login')loginView('login');else if(name==='signup')loginView('signup');else if(name==='dashboard')dashboard();else if(name==='new')appForm(id);else if(name==='app')appDetail(id);else if(name==='inbox')inbox();else if(name==='committee')committee();else if(name==='irb')irb();else if(name==='verify')verify();else if(name==='backup')backup();else loginView('login')}
window.route=route;window.logout=logout;window.saveProtocol=saveProtocol;window.submitApp=submitApp;window.openAssign=openAssign;window.openDecision=openDecision;window.openUser=openUser;window.setRole=setRole;window.closeModal=closeModal;window.showCertificate=showCertificate;window.downloadCertHtml=downloadCertHtml;window.exportData=exportData;window.importData=importData;window.reviewForm=reviewForm;
window.addEventListener('hashchange',render);render();
</script>
</body>
</html>
